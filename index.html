<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="google-site-verification" content="mdsrHFrEfvd5SVXmjHKhl7hGs076Q8w2_MEl4QaTc00" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>우리 가족 달력</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f7f7f5;color:#1a1a1a;min-height:100vh}
#loading{position:fixed;inset:0;background:#f7f7f5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999}
.spinner{width:30px;height:30px;border:3px solid #ddd;border-top-color:#378add;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#config-screen{display:none;position:fixed;inset:0;background:#f7f7f5;z-index:998;padding:20px;overflow-y:auto}
#config-screen.show{display:flex;flex-direction:column;align-items:center;justify-content:center}
.config-box{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:460px;border:1px solid #e5e5e3}
.config-box h1{font-size:22px;font-weight:700;margin-bottom:8px}
.config-box p{font-size:13px;color:#888;line-height:1.7;margin-bottom:18px}
.config-box ol{font-size:13px;color:#666;line-height:2.2;padding-left:18px;margin-bottom:20px}
.config-box ol a{color:#378add}
.app{max-width:100%;padding:16px 16px 60px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.month-nav{display:flex;align-items:center;gap:10px}
.month-label{font-size:20px;font-weight:700;min-width:110px}
.nav-btn{background:#fff;border:1px solid #e0e0de;border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#888}
.nav-btn:hover{background:#f0f0ee}
.today-btn{background:#fff;border:1px solid #e0e0de;border-radius:8px;padding:0 14px;height:34px;cursor:pointer;font-size:13px;color:#666}
.today-btn:hover{background:#f0f0ee}
.settings-btn{background:#fff;border:1px solid #e0e0de;border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.members-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;min-height:32px}
.m-pill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1.5px solid;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;user-select:none}
.m-pill.off{opacity:.3}
.m-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:3px}
.wday{font-size:11px;font-weight:600;color:#aaa;padding:4px 0}
.wday:first-child{color:#e04a4a}
.wday:last-child{color:#378add}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border-left:1px solid #e8e8e6;border-top:1px solid #e8e8e6}
.day-cell{min-height:110px;background:#fff;padding:6px 4px 4px;cursor:pointer;border-right:1px solid #e8e8e6;border-bottom:1px solid #e8e8e6;position:relative;overflow:visible}
.day-cell:hover{background:#fafaf8}
.day-cell.other{background:#f6f6f4}
.day-cell.other .day-num{color:#ccc}
.day-cell.is-today{background:#f0f7ff}
.day-num{font-size:12px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:#999;margin-bottom:2px;font-weight:600;border-radius:50%;flex-shrink:0}
.day-cell.is-today .day-num{background:#378add;color:#fff !important}
.day-cell:nth-child(7n+1):not(.other) .day-num{color:#e04a4a}
.day-cell:nth-child(7n):not(.other) .day-num{color:#378add}
.day-header{display:flex;align-items:center;gap:3px;margin-bottom:2px}
.day-stickers{display:flex;gap:1px;flex-wrap:wrap}
.sticker-sm{font-size:11px;line-height:1}
.ev-layer{position:absolute;left:0;right:0;top:30px}
.ev-row{height:18px;position:relative;margin-bottom:2px}
.ev-block{position:absolute;height:16px;border-radius:3px;font-size:10px;font-weight:600;display:flex;align-items:center;padding:0 5px;white-space:nowrap;overflow:hidden;cursor:pointer;z-index:1;top:0}
.ev-block:hover{filter:brightness(.93);z-index:2}
.ev-block.start{border-radius:8px 3px 3px 8px}
.ev-block.end{border-radius:3px 8px 8px 3px}
.ev-block.start.end{border-radius:8px}
.ev-block.middle{border-radius:0}
.ev-more{font-size:9px;color:#999;padding-left:4px;margin-top:1px;cursor:pointer}

/* ── 하단 섹션 공통 */
.bottom-sections{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
.section-card{background:#fff;border-radius:12px;border:1px solid #e8e8e6;padding:16px;overflow:hidden}
.section-title{font-size:13px;font-weight:700;color:#555;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* D-day */
.dday-list{display:flex;flex-direction:column;gap:8px}
.dday-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border-radius:8px;background:#f7f7f5}
.dday-info{display:flex;align-items:center;gap:7px;min-width:0}
.dday-sticker{font-size:18px;flex-shrink:0}
.dday-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dday-sub{font-size:11px;color:#aaa;margin-top:1px}
.dday-badge{flex-shrink:0;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;background:#378add;color:#fff;white-space:nowrap}
.dday-badge.today{background:#e04a4a}
.dday-badge.past{background:#bbb}
.dday-empty{font-size:12px;color:#bbb;text-align:center;padding:12px 0}

/* 메모장 */
.memo-who{display:flex;gap:6px;flex-wrap:wrap}
.memo-who-btn{padding:5px 12px;border-radius:20px;border:1.5px solid;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;opacity:.35;background:#fff;font-family:inherit}
.memo-who-btn.active{opacity:1}
.memo-input{flex:1;border:1px solid #e8e8e6;border-radius:8px;padding:9px 10px;font-size:13px;line-height:1.5;resize:none;font-family:inherit;color:#1a1a1a;background:#fafaf8;outline:none;min-width:0}
.memo-input:focus{border-color:#378add;background:#fff}
.memo-send-btn{padding:0 14px;border-radius:8px;border:none;background:#378add;color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;white-space:nowrap;height:100%;min-height:40px}
.memo-send-btn:hover{background:#2a6db8}
.memo-feed{display:flex;flex-direction:column;gap:8px;margin-top:12px;max-height:260px;overflow-y:auto}
.memo-bubble-wrap{display:flex;flex-direction:column;gap:2px}
.memo-bubble-name{font-size:11px;font-weight:600;padding:0 4px}
.memo-bubble{display:inline-block;max-width:85%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5;word-break:break-word;position:relative}
.memo-bubble-time{font-size:10px;color:#bbb;padding:0 4px;align-self:flex-end}
.memo-bubble-row{display:flex;align-items:flex-end;gap:6px}
.memo-del{border:none;background:none;color:#ccc;cursor:pointer;font-size:14px;padding:0 2px;line-height:1;opacity:0}
.memo-bubble-row:hover .memo-del{opacity:1}
.memo-empty{font-size:12px;color:#bbb;text-align:center;padding:16px 0}

/* 이번 달 일정 목록 */
.evlist-section{grid-column:1/-1}
.evlist{display:flex;flex-direction:column;gap:6px}
.evlist-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;background:#f7f7f5;cursor:pointer}
.evlist-item:hover{background:#f0f0ee}
.evlist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.evlist-date{font-size:11px;color:#aaa;width:90px;flex-shrink:0}
.evlist-sticker{font-size:14px;flex-shrink:0}
.evlist-title{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.evlist-member{font-size:11px;padding:2px 8px;border-radius:10px;flex-shrink:0;font-weight:600}
.evlist-empty{font-size:12px;color:#bbb;text-align:center;padding:16px 0}

/* 모달 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:12px;padding:22px;width:100%;max-width:400px;max-height:92vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#1a1a1a;background:#fff;outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#378add;box-shadow:0 0 0 2px rgba(55,138,221,.12)}
.field textarea{resize:none;height:60px;line-height:1.5}
.repeat-row{display:flex;align-items:center;gap:8px}
.repeat-row input[type=checkbox]{width:15px;height:15px;accent-color:#378add;cursor:pointer}
.repeat-row label{font-size:13px;cursor:pointer}
.repeat-row select{font-size:12px;padding:3px 6px;width:auto;border:1px solid #ddd;border-radius:6px}
.sticker-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.sticker-opt{font-size:26px;cursor:pointer;padding:6px 8px;border-radius:10px;border:2px solid transparent;transition:all .15s;user-select:none;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.sticker-opt:hover{background:#f5f5f3}
.sticker-opt.selected{border-color:#378add;background:#f0f7ff}
.sticker-opt.none-opt{font-size:13px;color:#aaa;padding:6px 10px;border:1px dashed #ddd;border-radius:10px;min-width:auto}
.sticker-opt.none-opt.selected{border-color:#378add;color:#378add;background:#f0f7ff}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#333;font-family:inherit;font-weight:500}
.btn:hover{background:#f5f5f3}
.btn.primary{background:#378add;color:#fff;border-color:#378add}
.btn.primary:hover{background:#2a6db8}
.btn.danger{color:#e04a4a;border-color:#f5c0c0}
.btn.danger:hover{background:#fff5f5}
.det-title{font-size:16px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.det-row{display:flex;align-items:center;gap:7px;font-size:13px;color:#777;margin-bottom:5px}
.det-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.det-memo{background:#f7f7f5;border-radius:8px;padding:9px 11px;font-size:13px;color:#333;line-height:1.6;margin-top:8px}
.member-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.member-row input{flex:1;font-size:13px;padding:6px 9px;border:1px solid #ddd;border-radius:7px;font-family:inherit}
.color-swatch{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.del-btn{border:none;background:none;color:#e04a4a;cursor:pointer;font-size:20px;line-height:1;padding:0 2px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;z-index:9999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){
  .app{padding:10px 8px 60px}
  .day-cell{min-height:76px;padding:4px 2px 2px}
  .ev-block{font-size:9px;height:14px;padding:0 3px}
  .ev-row{height:15px;margin-bottom:1px}
  .ev-layer{top:26px}
  .month-label{font-size:17px}
  .m-pill{font-size:11px;padding:4px 9px}
  .day-num{font-size:11px;width:20px;height:20px}
  .bottom-sections{grid-template-columns:1fr}
  .evlist-date{width:72px}
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span style="font-size:13px;color:#aaa">연결 중...</span>
</div>

<div id="config-screen">
  <div class="config-box">
    <h1>🏠 우리 가족 달력</h1>
    <p>처음 한 번만 Firebase 설정이 필요해요.<br>가족 모두 같은 URL을 입력하면 실시간으로 공유됩니다.</p>
    <ol>
      <li><a href="https://console.firebase.google.com" target="_blank">Firebase Console</a> → 프로젝트 선택</li>
      <li>Realtime Database → 데이터 탭의 URL 복사</li>
      <li>아래에 붙여넣기 후 저장</li>
    </ol>
    <div class="field">
      <label>Firebase 데이터베이스 URL</label>
      <input type="text" id="cfg-url" placeholder="https://your-project-default-rtdb.firebasedatabase.app"/>
    </div>
    <div class="field">
      <label>가족 이름</label>
      <input type="text" id="cfg-name" placeholder="우리 가족" value="우리 가족"/>
    </div>
    <button class="btn primary" style="width:100%;padding:11px;margin-top:6px;font-size:14px" onclick="saveConfig()">저장하고 시작하기</button>
    <p style="margin-top:12px;text-align:center;font-size:11px;color:#bbb">설정값은 이 기기에만 저장되며, 가족 모두 동일하게 한 번씩 입력하면 돼요.</p>
  </div>
</div>

<div class="app" id="main-app" style="display:none">
  <div class="top-bar">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
      <button class="today-btn" onclick="goToday()">오늘</button>
    </div>
    <button class="settings-btn" onclick="openSettings()">⚙️</button>
  </div>
  <div class="members-bar" id="membersBar"></div>
  <div class="weekdays">
    <div class="wday">일</div><div class="wday">월</div><div class="wday">화</div>
    <div class="wday">수</div><div class="wday">목</div><div class="wday">금</div><div class="wday">토</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>

  <!-- 하단 섹션 -->
  <div class="bottom-sections">
    <!-- D-day -->
    <div class="section-card">
      <div class="section-title">⏳ D-day</div>
      <div class="dday-list" id="ddayList"></div>
    </div>

    <!-- 가족 메모장 -->
    <div class="section-card">
      <div class="section-title">📝 가족 메모장 <span id="memoMonthLabel" style="font-weight:400;color:#aaa;font-size:12px"></span></div>
      <!-- 구성원 선택 -->
      <div class="memo-who" id="memoWho"></div>
      <!-- 메모 입력 -->
      <div style="display:flex;gap:8px;margin-top:10px">
        <textarea class="memo-input" id="memoInput" placeholder="메모를 입력하세요..." rows="2"></textarea>
        <button class="memo-send-btn" onclick="sendMemo()">등록</button>
      </div>
      <!-- 메모 피드 -->
      <div class="memo-feed" id="memoFeed"></div>
    </div>

    <!-- 이번 달 일정 목록 -->
    <div class="section-card evlist-section">
      <div class="section-title">📋 이번 달 일정 <span id="evlistMonthLabel" style="font-weight:400;color:#aaa;font-size:12px"></span></div>
      <div class="evlist" id="evList"></div>
    </div>
  </div>
</div>

<!-- 일정 추가/수정 모달 -->
<div class="overlay hidden" id="addOverlay">
  <div class="modal">
    <h2 id="addTitle">일정 추가</h2>
    <div class="field"><label>제목 *</label><input type="text" id="evTitle" placeholder="일정 이름"/></div>
    <div class="field">
      <label>시작일</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">
        <select id="evStartY" style="font-size:13px;padding:7px 4px;border:1px solid #ddd;border-radius:8px;text-align:center"></select>
        <select id="evStartM" style="font-size:13px;padding:7px 4px;border:1px solid #ddd;border-radius:8px;text-align:center"></select>
        <select id="evStartD" style="font-size:13px;padding:7px 4px;border:1px solid #ddd;border-radius:8px;text-align:center"></select>
      </div>
    </div>
    <div class="field">
      <label>종료일</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">
        <select id="evEndY" style="font-size:13px;padding:7px 4px;border:1px solid #ddd;border-radius:8px;text-align:center"></select>
        <select id="evEndM" style="font-size:13px;padding:7px 4px;border:1px solid #ddd;border-radius:8px;text-align:center"></select>
        <select id="evEndD" style="font-size:13px;padding:7px 4px;border:1px solid #ddd;border-radius:8px;text-align:center"></select>
      </div>
    </div>
    <div class="field"><label>구성원</label><select id="evMember"></select></div>
    <div class="field">
      <label>스티커</label>
      <div class="sticker-picker" id="stickerPicker"></div>
    </div>
    <div class="field"><label>메모</label><textarea id="evMemo" placeholder="메모 (선택)"></textarea></div>
    <div class="field">
      <div class="repeat-row">
        <input type="checkbox" id="evRepeat" onchange="toggleRepeat()"/>
        <label for="evRepeat">반복 일정</label>
        <select id="evRepeatType" style="display:none">
          <option value="weekly">매주</option>
          <option value="monthly">매월</option>
        </select>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeAdd()">취소</button>
      <button class="btn primary" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="overlay hidden" id="detOverlay">
  <div class="modal">
    <div class="det-title"><span id="detSticker"></span><span id="detTitle"></span></div>
    <div class="det-row"><div class="det-dot" id="detDot"></div><span id="detMember"></span></div>
    <div class="det-row">📅 <span id="detDate"></span></div>
    <div class="det-row" id="detRepeatRow" style="display:none">🔁 <span id="detRepeatTxt"></span></div>
    <div class="det-memo" id="detMemo" style="display:none"></div>
    <div class="modal-btns">
      <button class="btn danger" id="btnDel">삭제</button>
      <button class="btn" id="btnEdit">수정</button>
      <button class="btn" onclick="closeDet()">닫기</button>
    </div>
  </div>
</div>

<!-- 설정 모달 -->
<div class="overlay hidden" id="settingsOverlay">
  <div class="modal">
    <h2>설정</h2>
    <div class="field"><label>가족 이름</label><input type="text" id="setName"/></div>
    <div style="margin-top:4px">
      <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:8px">구성원 관리</div>
      <div id="membersList"></div>
      <button class="btn" style="font-size:12px;margin-top:4px" onclick="addMember()">+ 구성원 추가</button>
    </div>
    <div class="modal-btns">
      <button class="btn danger" onclick="resetApp()">초기화</button>
      <button class="btn" onclick="closeSettings()">취소</button>
      <button class="btn primary" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const LS_KEY='fam_cal_v4';
const STICKERS=[
  {emoji:'🎂',label:'생일'},
  {emoji:'✈️',label:'여행'},
  {emoji:'🏥',label:'병원'},
  {emoji:'📚',label:'학교/공부'},
  {emoji:'💝',label:'기념일'},
];
const COLOR_OPTIONS=[
  {color:'#378ADD',bg:'#E6F1FB',tc:'#0C447C'},
  {color:'#D4537E',bg:'#FBEAF0',tc:'#72243E'},
  {color:'#1D9E75',bg:'#E1F5EE',tc:'#085041'},
  {color:'#BA7517',bg:'#FAEEDA',tc:'#633806'},
  {color:'#888780',bg:'#F1EFE8',tc:'#2C2C2A'},
  {color:'#E24B4A',bg:'#FCEBEB',tc:'#501313'},

function getDatesInRange(start,end){
  const dates=[];
  let d=new Date(start+'T00:00:00');
  const e=new Date(end+'T00:00:00');
  while(d<=e){dates.push(fmt(d));d.setDate(d.getDate()+1);}
  return dates;
}
function daysBetween(a,b){return (dateToMs(b)-dateToMs(a))/(1000*60*60*24);}

function buildEventLayout(cells){
  const cellMap={};
  cells.forEach(c=>{cellMap[c.date]={cell:c,events:[],rows:{}};});
  const evList=Object.entries(allEvents)
    .filter(([,e])=>activeMembers.has(e.member))
    .map(([id,e])=>({id,...e,endDate:e.endDate||e.date}))
    .sort((a,b)=>{
      const la=daysBetween(a.date,a.endDate),lb=daysBetween(b.date,b.endDate);
      return la!==lb?lb-la:a.date.localeCompare(b.date);
    });
  evList.forEach(ev=>{
    const dates=getDatesInRange(ev.date,ev.endDate).filter(d=>cellMap[d]);
    if(!dates.length)return;
    let row=0;
    while(true){
      if(!dates.some(d=>cellMap[d].rows[row]))break;
      if(++row>10)return;
    }
    dates.forEach((d,i)=>{
      if(!cellMap[d])return;
      cellMap[d].rows[row]=true;
      cellMap[d].events.push({...ev,row,pos:i===0?'start':i===dates.length-1?'end':'middle',isFirst:i===0});
    });
  });
  return cellMap;
}

function renderGrid(){
  const y=cur.getFullYear(),mo=cur.getMonth();
  document.getElementById('monthLabel').textContent=`${y}년 ${mo+1}월`;
  const first=new Date(y,mo,1),last=new Date(y,mo+1,0);
  const cells=[];
  for(let i=0;i<first.getDay();i++)cells.push({date:fmt(new Date(y,mo,-first.getDay()+i+1)),other:true});
  for(let d=1;d<=last.getDate();d++)cells.push({date:fmt(new Date(y,mo,d)),other:false});
  const rem=7-(cells.length%7);if(rem<7)for(let i=1;i<=rem;i++)cells.push({date:fmt(new Date(y,mo+1,i)),other:true});
  const td=todayStr();
  const cellMap=buildEventLayout(cells);
  const isMobile=window.innerWidth<=600;
  const maxRows=isMobile?2:3;

  document.getElementById('calGrid').innerHTML=cells.map(c=>{
    const dn=parseInt(c.date.split('-')[2]);
    const isToday=!c.other&&c.date===td;
    const data=cellMap[c.date]||{events:[],rows:{}};
    const stickersHere=[...new Set(Object.values(allEvents).filter(e=>e.date===c.date&&e.sticker&&activeMembers.has(e.member)).map(e=>e.sticker))];
    const byRow={};
    data.events.forEach(e=>{if(!byRow[e.row])byRow[e.row]=[];byRow[e.row].push(e);});
    const rowKeys=Object.keys(byRow).map(Number).sort((a,b)=>a-b);
    const visibleRows=rowKeys.slice(0,maxRows);
    const hiddenCount=data.events.filter(e=>e.isFirst&&e.row>=maxRows).length;
    const dow=new Date(c.date+'T00:00:00').getDay();

    let evHtml='<div class="ev-layer">';
    visibleRows.forEach(row=>{
      evHtml+=`<div class="ev-row">`;
      (byRow[row]||[]).forEach(ev=>{
        const m=getMember(ev.member);
        const isSingle=ev.date===ev.endDate;
        const endOfWeek=6-dow;
        const daysLeft=Math.round(daysBetween(c.date,ev.endDate));
        const span=isSingle?1:Math.min(endOfWeek+1,daysLeft+1);
        const w=`calc(${span*100}% + ${span-1}px)`;
        const posClass=isSingle?'start end':(ev.pos==='start'?'start':ev.pos==='end'?'end':'middle');
        const evData=allEvents[ev.id]||ev;
        const label=(evData.sticker?evData.sticker+' ':'')+ev.title;
        evHtml+=`<div class="ev-block ${posClass}" style="background:${m.bg};color:${m.tc};width:${w};left:0" onclick="openDet(event,'${ev.id}')" title="${ev.title}">${label}</div>`;
      });
      evHtml+='</div>';
    });
    if(hiddenCount>0)evHtml+=`<div class="ev-more">+${hiddenCount}개 더</div>`;
    evHtml+='</div>';

    return `<div class="day-cell${c.other?' other':''}${isToday?' is-today':''}" onclick="clickDay('${c.date}')">
      <div class="day-header">
        <div class="day-num">${dn}</div>
        <div class="day-stickers">${stickersHere.map(s=>`<span class="sticker-sm">${s}</span>`).join('')}</div>
      </div>
      ${evHtml}
    </div>`;
  }).join('');
}

// ── D-day 렌더
function renderDday(){
  const td=todayStr();
  const todayMs=dateToMs(td);

  // 스티커 있는 이벤트 + 생일/기념일 우선, 가까운 순
  const ddayEvs=Object.entries(allEvents)
    .filter(([,e])=>e.sticker&&activeMembers.has(e.member))
    .map(([id,e])=>{
      // 올해 날짜로 계산 (생일 등 반복 고려)
      const curY=new Date().getFullYear();
      const evDate=e.date;
      const mmdd=evDate.slice(5);
      let target=`${curY}-${mmdd}`;
      if(target<td) target=`${curY+1}-${mmdd}`;
      const diff=Math.round((dateToMs(target)-todayMs)/(1000*60*60*24));
      return {id,...e,diff,target};
    })
    .sort((a,b)=>Math.abs(a.diff)-Math.abs(b.diff))
    .slice(0,5);

  const list=document.getElementById('ddayList');
  if(!ddayEvs.length){
    list.innerHTML=`<div class="dday-empty">스티커가 있는 일정이 D-day로 표시돼요</div>`;
    return;
  }
  list.innerHTML=ddayEvs.map(e=>{
    const badge=e.diff===0?'D-day':e.diff>0?`D-${e.diff}`:`D+${Math.abs(e.diff)}`;
    const cls=e.diff===0?'today':e.diff<0?'past':'';
    const m=getMember(e.member);
    return `<div class="dday-item" onclick="openDet(event,'${e.id}')">
      <div class="dday-info">
        <div class="dday-sticker">${e.sticker}</div>
        <div>
          <div class="dday-name">${e.title}</div>
          <div class="dday-sub">${e.target} · ${e.member}</div>
        </div>
      </div>
      <div class="dday-badge ${cls}">${badge}</div>
    </div>`;
  }).join('');
}

  const evs=Object.entries(allEvents)

    .map(([id,e])=>({id,...e,endDate:e.endDate||e.date}))

  const list=document.getElementById('evList');

    list.innerHTML=`<div class="evlist-empty">이번 달 일정이 없어요</div>`;
    return;

    const m=getMember(e.member);

function renderMemoFeed(data){
  const feed=document.getElementById('memoFeed');

  if(!items.length){feed.innerHTML='<div class="memo-empty">이번 달 첫 메모를 남겨보세요 ✏️</div>';return;}

function fillDateSelects(prefix,dateStr){
  const d=dateStr?new Date(dateStr+'T00:00:00'):new Date();
  const y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();
  const curY=new Date().getFullYear();
  const yEl=document.getElementById(prefix+'Y'),mEl=document.getElementById(prefix+'M'),dEl=document.getElementById(prefix+'D');
  yEl.innerHTML=[...Array(6)].map((_,i)=>curY-1+i).map(yr=>`<option value="${yr}"${yr===y?' selected':''}>${yr}년</option>`).join('');
  mEl.innerHTML=[...Array(12)].map((_,i)=>i+1).map(mo=>`<option value="${String(mo).padStart(2,'0')}"${mo===m?' selected':''}>${mo}월</option>`).join('');
  updateDays(prefix,y,m,day);
  yEl.onchange=()=>updateDays(prefix,parseInt(yEl.value),parseInt(mEl.value));
  mEl.onchange=()=>updateDays(prefix,parseInt(yEl.value),parseInt(mEl.value));
}
function updateDays(prefix,y,m,keepDay){
  const dEl=document.getElementById(prefix+'D');
  const maxDay=new Date(y,m,0).getDate();
  const curDay=keepDay||parseInt(dEl.value)||1;
  const sel=Math.min(curDay,maxDay);
  dEl.innerHTML=[...Array(maxDay)].map((_,i)=>i+1).map(d=>`<option value="${String(d).padStart(2,'0')}"${d===sel?' selected':''}>${d}일</option>`).join('');
}
function getSelectDate(prefix){
  return `${document.getElementById(prefix+'Y').value}-${document.getElementById(prefix+'M').value}-${document.getElementById(prefix+'D').value}`;
}

function openAdd(date,ev=null){
  editingId=ev?ev.id:null;
  document.getElementById('addTitle').textContent=ev?'일정 수정':'일정 추가';
  document.getElementById('evTitle').value=ev?ev.title:'';
  document.getElementById('evMemo').value=ev?(ev.memo||''):'';
  document.getElementById('evRepeat').checked=!!(ev&&ev.repeat);
  const rsel=document.getElementById('evRepeatType');
  rsel.style.display=(ev&&ev.repeat)?'inline':'none';
  if(ev&&ev.repeat)rsel.value=ev.repeat;
  document.getElementById('evMember').innerHTML=members.map(m=>`<option value="${m.name}"${ev&&ev.member===m.name?' selected':''}>${m.name}</option>`).join('');
  fillDateSelects('evStart',ev?ev.date:date);
  fillDateSelects('evEnd',ev?(ev.endDate||ev.date):date);
  buildStickerPicker(ev?ev.sticker||'':'');
  document.getElementById('addOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('evTitle').focus(),80);
}
window.toggleRepeat=()=>{document.getElementById('evRepeatType').style.display=document.getElementById('evRepeat').checked?'inline':'none';};
window.closeAdd=()=>{document.getElementById('addOverlay').classList.add('hidden');editingId=null;};

window.saveEvent=async()=>{
  const title=document.getElementById('evTitle').value.trim();
  if(!title){toast('제목을 입력해 주세요');return;}
  const startDate=getSelectDate('evStart'),endDate=getSelectDate('evEnd');
  const ev={title,date:startDate,endDate:endDate>=startDate?endDate:startDate,
    member:document.getElementById('evMember').value,sticker:selectedSticker||null,
    memo:document.getElementById('evMemo').value.trim(),
    repeat:document.getElementById('evRepeat').checked?document.getElementById('evRepeatType').value:null,
    updatedAt:Date.now()};
  try{
    if(editingId){await update(ref(db,'events/'+editingId),ev);toast('수정됐어요');}
    else{await push(ref(db,'events'),ev);toast('추가됐어요');}
    closeAdd();
  }catch(e){toast('저장 실패: '+e.message);}
};

    </div>`).join('');
}
window.addMember=()=>{const col=COLOR_OPTIONS[settingsMembersTemp.length%COLOR_OPTIONS.length];settingsMembersTemp.push({name:'새 구성원',...col});renderMembersList();};
window.delMember=i=>{settingsMembersTemp.splice(i,1);renderMembersList();};
window.saveSettings=async()=>{
  const familyName=document.getElementById('setName').value.trim()||'우리 가족';
  const updated=settingsMembersTemp.map((m,i)=>{const inp=document.getElementById('mn-'+i);return{...m,name:inp?inp.value.trim()||m.name:m.name};});
  try{await set(ref(db,'settings'),{familyName,members:updated});toast('설정이 모든 기기에 동기화됐어요 ✓');closeSettings();}
  catch(e){toast('저장 실패: '+e.message);}
};
window.resetApp=()=>{if(!confirm('초기화하면 Firebase URL을 다시 입력해야 해요. 계속할까요?'))return;localStorage.removeItem(LS_KEY);location.reload();};

['addOverlay','detOverlay','settingsOverlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){
    if(e.target===this){
      if(id==='addOverlay')closeAdd();
      else if(id==='detOverlay')closeDet();
      else closeSettings();
    }
  });
});
</script>
</body>
</html>
